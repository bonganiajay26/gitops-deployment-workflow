name: CI — Build, Test, Push, Update GitOps Repo

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: python-devops-app

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: Run Tests
  # ─────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short

  # ─────────────────────────────────────────────
  # JOB 2: Build & Push Docker Image
  # Runs only on push to main (not on PRs)
  # ─────────────────────────────────────────────
  build-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    continue-on-error: true
    outputs:
      image-tag: ${{ steps.vars.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha }}
            ${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image digest
        run: echo "Image pushed with tag ${{ steps.vars.outputs.sha }}"

  # ─────────────────────────────────────────────
  # JOB 3: Update GitOps Repo (trigger ArgoCD)
  # CI never touches the cluster directly!
  # ─────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Repo
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.build-push.result == 'success'
    continue-on-error: true
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops

      - name: Update image tag in values.yaml
        run: |
          cd gitops
          IMAGE_TAG=${{ needs.build-push.outputs.image-tag }}
          sed -i "s|tag:.*|tag: \"${IMAGE_TAG}\"|" environments/production/values.yaml
          echo "Updated image tag to: ${IMAGE_TAG}"

      - name: Commit and push image tag update
        run: |
          cd gitops
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/production/values.yaml
          git diff --staged --quiet || git commit -m "chore: update production image to ${{ needs.build-push.outputs.image-tag }} [skip ci]"
          git push
          echo "GitOps repo updated — ArgoCD will sync automatically"
