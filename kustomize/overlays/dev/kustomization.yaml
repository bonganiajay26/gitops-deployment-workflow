apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: dev
namePrefix: dev-
resources:
  - ../../base
commonLabels:
  environment: dev
patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: python-devops-app
images:
  - name: YOUR_DOCKERHUB_USERNAME/python-devops-app
    newTag: latest
