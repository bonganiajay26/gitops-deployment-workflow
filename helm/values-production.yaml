replicaCount: 3

image:
  tag: "PLACEHOLDER_SHA"   # replaced by CI pipeline via sed

service:
  type: ClusterIP

ingress:
  enabled: true
  host: app.yourdomain.com
  tls: true
  tlsSecretName: prod-tls-secret

resources:
  requests:
    memory: "64Mi"
    cpu: "100m"
  limits:
    memory: "128Mi"
    cpu: "250m"

hpa:
  enabled: true
  minReplicas: 3
  maxReplicas: 50
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 70

env:
  FLASK_ENV: production
  PORT: "5000"
